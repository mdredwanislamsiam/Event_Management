{% extends navbar %}

{% block content %}

<section class="w-1/2 mx-auto">
    
    <div class="text-center my-20 bg-green-500 py-3 rounded">
        {% if messages %}
            {% for message in messages %}
                <p>{{message}}</p>
            {% endfor %}
        {% endif %}
    </div>
    <div class="text-center">
        <a href="{% url 'profile' %}">
            <button type = 'submit' class='bg-blue-600 focus:bg-blue-900 rounded shadow-lg py-1 px-3 text-white' >
                Go back To profile -> 
            </button>
        </a>
    </div>
</section>

{% endblock content %}
