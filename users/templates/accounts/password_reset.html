<!-- templates/registration/password_reset.html -->
{% extends "navbar.html" %}
{% block content %}

<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:wght@700;800&family=IBM+Plex+Mono:wght@400;500&family=Instrument+Sans:wght@400;500;600&display=swap');

  .si-page {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 60px 16px;
    font-family: 'Instrument Sans', sans-serif;
  }

  .si-card {
    position: relative;
    width: 100%;
    max-width: 480px;
    background: #302D29;
    border: 1px solid rgba(255,255,255,0.07);
    border-radius: 24px;
    padding: 48px 44px 44px;
    overflow: hidden;
    animation: si-rise 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
  }

  @keyframes si-rise {
    from { opacity: 0; transform: translateY(28px); }
    to   { opacity: 1; transform: translateY(0); }
  }


  .si-header {
    text-align: center;
    margin-bottom: 36px;
  }

  .si-title {
    font-family: 'Fraunces', serif;
    font-size: 2.2rem;
    font-weight: 800;
    color: #fff;
    letter-spacing: -0.03em;
    line-height: 1.1;
    margin: 0 0 10px;
  }

  .si-title span {
    background: linear-gradient(95deg, #f97316 20%, #fbbf24 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .si-subtitle {
    font-size: 0.83rem;
    color: #9ca3af;
    line-height: 1.6;
  }

  .si-messages {
    margin-bottom: 24px;
  }

  .si-alert {
    background: rgba(239,68,68,0.12);
    border: 1px solid rgba(239,68,68,0.3);
    border-radius: 10px;
    padding: 12px 16px;
    font-size: 0.84rem;
    color: #fca5a5;
    margin-bottom: 12px;
  }

  .si-alert.success,
  .si-alert.info {
    background: rgba(249,115,22,0.12);
    border-color: rgba(249,115,22,0.3);
    color: #fdba74;
  }

  form p {
    margin-bottom: 20px;
  }

  label {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #9ca3af;
    display: block;
    margin-bottom: 8px;
  }

  input[type="email"],
  input[type="text"],
  input[type="password"] {
    width: 100%;
    background: #1a1a1a;
    border: 1px solid rgba(255,255,255,0.09);
    border-radius: 10px;
    padding: 13px 16px;
    color: white;
    font-size: 0.92rem;
    font-family: 'Instrument Sans', sans-serif;
  }

  input::placeholder {
    color: #4b5563;
  }

  input:focus {
    border-color: #f97316;
    box-shadow: 0 0 0 3px rgba(249,115,22,0.15);
    outline: none;
  }

  .si-submit {
    width: 100%;
    background: #f97316;
    color: white;
    font-weight: 700;
    font-size: 0.88rem;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 14px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .si-submit:hover {
    background: #ea580c;
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(249,115,22,0.25);
  }

  .si-footer {
    text-align: center;
    margin-top: 28px;
    font-size: 0.84rem;
    color: #9ca3af;
  }

  .si-footer a {
    color: #f97316;
    font-weight: 600;
    text-decoration: none;
  }

  .si-footer a:hover {
    color: #fbbf24;
  }

  @media (max-width: 500px) {
    .si-card {
      padding: 40px 28px 36px;
      border-radius: 20px;
    }
    .si-title {
      font-size: 1.9rem;
    }
  }
</style>

<div class="si-page">
  <div class="si-card ">

    <div class="si-header">
      <h1 class="si-title">Reset <span>Password</span></h1>
      <p class="si-subtitle">We'll send a reset link to your email address.</p>
    </div>

    {% if messages %}
      <div class="si-messages">
        {% for message in messages %}
          <div class="si-alert {% if message.tags %} {{ message.tags }}{% endif %}">
            {{ message }}
          </div>
        {% endfor %}
      </div>
    {% endif %}

    <form method="post" novalidate>
      {% csrf_token %}
      {{ form.as_p }}

      <button type="submit" class="si-submit">Send Reset Link</button>

      <div class="si-footer">
        <a href="{% url 'sign_in' %}">← Back to Sign In</a>
      </div>
    </form>

  </div>
</div>

{% endblock content %}
